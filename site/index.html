<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII Renderer — Documentation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d1117; }

    .layout {
      display: flex;
      width: 100%;
      height: 100%;
    }

    #sidebar {
      width: 220px;
      min-width: 220px;
      height: 100vh;
    }

    #app {
      flex: 1;
      height: 100vh;
      min-width: 0;
    }
  </style>
</head>
<body>
  <div class="layout">
    <div id="sidebar"></div>
    <div id="app"></div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
