<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII Renderer — Documentation</title>
  <script type="importmap">
  {
    "imports": {
      "ascii-renderer": "https://unpkg.com/ascii-renderer@0.1.2/dist/ascii-renderer.js"
    }
  }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d1117; }

    .layout {
      display: flex;
      width: 100%;
      height: 100%;
    }

    #sidebar {
      width: 220px;
      min-width: 220px;
      height: 100vh;
    }

    #app {
      flex: 1;
      height: 100vh;
      min-width: 0;
    }
  </style>
</head>
<body>
  <div class="layout">
    <div id="sidebar"></div>
    <div id="app"></div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
