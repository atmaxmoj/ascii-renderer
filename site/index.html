<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII Renderer — HTML/CSS to ASCII Art Rendering Engine</title>
  <meta name="description" content="Pure-ASCII UI rendering engine that converts HTML/CSS into interactive ASCII art on Canvas. Supports forms, tables, scroll, drag, CJK text, and Mermaid diagrams.">
  <meta name="keywords" content="ascii, renderer, html to ascii, canvas, tui, terminal ui, ascii art, mermaid, box-drawing">
  <meta property="og:title" content="ASCII Renderer — HTML/CSS to ASCII Art">
  <meta property="og:description" content="Pure-ASCII UI rendering engine: HTML/CSS input → interactive ASCII art output on Canvas. LLM-friendly with .toText() export.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://atmaxmoj.github.io/ascii-renderer/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="ASCII Renderer — HTML/CSS to ASCII Art">
  <meta name="twitter:description" content="Pure-ASCII UI rendering engine: HTML/CSS input → interactive ASCII art output on Canvas.">
  <link rel="canonical" href="https://atmaxmoj.github.io/ascii-renderer/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d1117; }

    .layout {
      display: flex;
      width: 100%;
      height: 100%;
    }

    #sidebar {
      width: 220px;
      min-width: 220px;
      height: 100vh;
    }

    #app {
      flex: 1;
      height: 100vh;
      min-width: 0;
    }
  </style>
</head>
<body>
  <div class="layout">
    <div id="sidebar"></div>
    <div id="app"></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "ascii-renderer": "https://unpkg.com/ascii-renderer@0.2.1/dist/ascii-renderer.js"
    }
  }
  </script>
  <script type="module" src="./main.js"></script>
</body>
</html>
